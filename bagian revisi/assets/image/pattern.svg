<svg width="600" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="smallGrid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(55, 154, 255, 0.3)" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#smallGrid)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(55, 154, 255, 0.5)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" />
  <circle cx="150" cy="150" r="50" fill="rgba(55, 154, 255, 0.1)" />
  <circle cx="450" cy="450" r="70" fill="rgba(55, 154, 255, 0.1)" />
  <circle cx="300" cy="300" r="100" fill="rgba(55, 154, 255, 0.05)" />
  <path d="M100,200 Q250,100 400,200" stroke="rgba(55, 154, 255, 0.2)" stroke-width="2" fill="none"/>
  <path d="M200,400 Q350,300 500,400" stroke="rgba(55, 154, 255, 0.2)" stroke-width="2" fill="none"/>
</svg>
